{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="ios-card">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock" style="font-size: 64px; color: #007AFF;"></i>
                <h3 class="mt-3 fw-bold">Staff Access</h3>
                <p class="text-muted">Secure employee portal</p>
            </div>
            
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-key me-1"></i> Password
                    </label>
                    <input type="password" 
                           name="password" 
                           class="form-control search-bar" 
                           placeholder="Enter staff password" 
                           required
                           autofocus>
                    <div class="form-text mt-2">
                        <i class="bi bi-info-circle"></i> Contact administrator for access
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary ios-button ios-button-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
            
            <hr class="my-4">
            
            <div class="text-center">
                <small class="text-muted">
                    <i class="bi bi-laptop"></i> Demo credentials:<br>
                    <code class="bg-light p-1 rounded">admin123</code>
                </small>
            </div>
            
            <div class="text-center mt-3">
                <a href="{{ url_for('index') }}" class="text-decoration-none small">
                    <i class="bi bi-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
        
        <!-- Security Note -->
        <div class="text-center mt-3">
            <small class="text-muted">
                <i class="bi bi-shield-check"></i> Secure login required for staff operations
            </small>
        </div>
    </div>
</div>
{% endblock %}
